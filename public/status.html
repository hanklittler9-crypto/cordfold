<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Status — Cordfol</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0d;
      --surface: #12121a;
      --surface2: #1a1a24;
      --discord: #5865F2;
      --neon: #00FFB2;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #FF3366;
      --warning: #FFB800;
      --success: #00FFB2;
    }
    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    nav {
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 13, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--discord);
      font-weight: 700;
    }
    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .nav-links a {
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover {
      color: var(--text);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px;
    }
    .header {
      margin-bottom: 48px;
    }
    .header-title {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--discord), var(--neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-sub {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .uptime-banner {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0, 255, 178, 0.08);
      border: 1px solid rgba(0, 255, 178, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .uptime-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 20px rgba(0, 255, 178, 0.8);
      flex-shrink: 0;
    }
    .uptime-text {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .uptime-value {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      color: var(--success);
    }
    .services-section {
      margin-bottom: 48px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: var(--discord);
      border-radius: 2px;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .service-card {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }
    .service-card:hover {
      border-color: rgba(88, 101, 242, 0.2);
      background: var(--surface2);
    }
    .service-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .service-name {
      font-size: 14px;
      font-weight: 600;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }
    .status-badge.operational {
      background: rgba(0, 255, 178, 0.15);
      color: var(--success);
    }
    .status-badge.degraded {
      background: rgba(255, 184, 0, 0.15);
      color: var(--warning);
    }
    .status-badge.down {
      background: rgba(255, 51, 102, 0.15);
      color: var(--danger);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-dot.operational {
      background: var(--success);
    }
    .status-dot.degraded {
      background: var(--warning);
    }
    .status-dot.down {
      background: var(--danger);
    }
    .service-message {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .service-time {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
    }
    .history-section {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
    }
    .history-card {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 16px;
    }
    .history-time {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .history-event {
      font-size: 13px;
      color: var(--text);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--discord);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 24px 40px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        gap: 16px;
        padding: 16px 20px;
      }
      .nav-links {
        width: 100%;
        justify-content: space-between;
      }
      .container {
        padding: 24px 20px;
      }
      .header-title {
        font-size: 28px;
      }
      .services-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Cordfol Status</div>
    <div class="nav-links">
      <a href="/">← Home</a>
      <a href="/admin">Admin Panel</a>
    </div>
  </nav>

  <div class="container">
    <div class="header">
      <h1 class="header-title">System Status</h1>
      <p class="header-sub">Real-time status of Cordfol.io platform and services</p>
      
      <div class="uptime-banner">
        <div class="uptime-dot"></div>
        <div class="uptime-text">
          All systems <span class="uptime-value" id="uptime">operational</span>
        </div>
      </div>
    </div>

    <div class="services-section">
      <h2 class="section-title">Current Status</h2>
      <div class="services-grid" id="services-grid">
        <div class="loading">
          <div class="spinner"></div>
          <p style="margin-top: 12px;">Loading status...</p>
        </div>
      </div>
    </div>

    <div class="history-section">
      <h2 class="section-title">Recent Events</h2>
      <div class="history-grid" id="history-grid">
        <div class="loading">
          <p>No recent events</p>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>Last updated: <span id="last-update">-</span></p>
    <p style="margin-top: 8px;">Status page updates every 60 seconds</p>
  </footer>

  <script>
    const API_BASE = '/api/admin';

    async function loadStatus() {
      try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();

        // Update uptime
        document.getElementById('uptime').textContent = data.uptime + '%';

        // Render services
        const grid = document.getElementById('services-grid');
        grid.innerHTML = '';

        if (data.services.length === 0) {
          grid.innerHTML = '<div class="loading"><p>No service status recorded yet</p></div>';
        } else {
          data.services.forEach(svc => {
            const card = document.createElement('div');
            card.className = 'service-card';
            card.innerHTML = `
              <div class="service-header">
                <div class="service-name">${svc.name}</div>
                <div class="status-badge ${svc.status}">
                  <div class="status-dot ${svc.status}"></div>
                  ${svc.status.charAt(0).toUpperCase() + svc.status.slice(1)}
                </div>
              </div>
              ${svc.message ? `<div class="service-message">${svc.message}</div>` : ''}
              <div class="service-time">${new Date(svc.lastUpdated).toLocaleString()}</div>
            `;
            grid.appendChild(card);
          });
        }

        // Update last update time
        const now = new Date();
        document.getElementById('last-update').textContent = now.toLocaleString();
      } catch (err) {
        console.error('Status load error:', err);
        document.getElementById('services-grid').innerHTML = '<div class="loading"><p>Failed to load status</p></div>';
      }
    }

    // Initial load
    loadStatus();

    // Refresh every 60 seconds
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
