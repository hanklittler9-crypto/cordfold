<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cordfol Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090d;
      --surface: #11131a;
      --surface2: #171922;
      --accent: #5865F2;
      --accent2: #7c5cff;
      --text: #f5f7fb;
      --muted: rgba(245,247,251,0.5);
      --neon: #00FFB2;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg);
      overflow: hidden;
    }
    .bg-animated::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      opacity: 0.15;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-animated::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
      bottom: -200px;
      right: -200px;
      opacity: 0.08;
      animation: drift2 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 80px) scale(1.2); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-80px, -60px) scale(1.15); } }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 88px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(180deg, rgba(18,20,28,0.92), rgba(12,13,19,0.92));
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88,101,242,0.14), transparent 34%, rgba(0,255,178,0.05));
      pointer-events: none;
    }

    /* ── Banner ── */
    .banner {
      width: 100%;
      height: 170px;
      background: linear-gradient(135deg, var(--accent), var(--accent2) 48%, var(--neon) 100%);
      position: relative;
      flex-shrink: 0;
    }
    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      display: flex;
      justify-content: flex-start;
      margin-top: -52px;
      position: relative;
      z-index: 2;
      padding: 0 26px;
    }
    .avatar {
      width: 106px;
      height: 106px;
      border-radius: 28px;
      border: 4px solid rgba(9,9,13,0.92);
      background: #222;
      object-fit: cover;
      box-shadow: 0 14px 36px rgba(0,0,0,0.42);
    }

    /* ── Body ── */
    .card-body {
      padding: 18px 26px 28px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .profile-heading {
      min-width: 0;
    }

    .profile-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .profile-kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 16px rgba(0,255,178,0.75);
    }

    .profile-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .profile-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .profile-bio {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 18px;
      max-width: 48ch;
    }

    .profile-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(245,247,251,0.72);
    }

    .summary-chip strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0 0 20px;
    }

    /* ── Roles ── */
    .roles-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      text-align: left;
    }

    .roles-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 12px 14px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .role-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }

    .role-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .role-info {
      flex: 1;
      min-width: 0;
    }

    .role-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .role-server {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .role-proof {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(88,101,242,0.12);
      color: #9db2ff;
      border: 1px solid rgba(88,101,242,0.22);
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .role-proof.bot {
      background: rgba(0,255,178,0.08);
      color: var(--neon);
      border-color: rgba(0,255,178,0.2);
    }

    /* ── Socials ── */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
      margin-top: 4px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .social-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Music player ── */
    .music-player {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 100;
      background: rgba(17,17,17,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-width: 214px;
    }

    .music-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .music-btn:hover { background: #4752C4; }

    .music-info {
      flex: 1;
      min-width: 0;
    }

    .music-label {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .music-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    .music-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: musicbar 0.8s ease-in-out infinite alternate;
    }
    .music-bar:nth-child(1) { animation-delay: 0s; }
    .music-bar:nth-child(2) { animation-delay: 0.15s; }
    .music-bar:nth-child(3) { animation-delay: 0.3s; }
    .music-bar:nth-child(4) { animation-delay: 0.45s; }
    .music-bar:nth-child(5) { animation-delay: 0.6s; }
    .music-bar.paused { animation-play-state: paused; }

    @keyframes musicbar {
      from { height: 3px; }
      to { height: 14px; }
    }

    /* ── Footer ── */
    .profile-footer {
      margin-top: 26px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.26);
      letter-spacing: 1px;
      text-align: center;
    }
    .profile-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .profile-footer a:hover { color: var(--neon); }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      padding: 64px 0;
      font-family: 'Space Mono', monospace;
    }
    .not-found h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .not-found p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .claim-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 40px 28px;
      text-align: center;
    }

    .claim-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--neon);
    }

    .claim-slug {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(88,101,242,0.28);
      background: rgba(88,101,242,0.12);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .claim-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    .claim-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }
    .claim-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(88,101,242,0.24);
    }
    .claim-btn.secondary {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-color: rgba(255,255,255,0.12);
      box-shadow: none;
    }
    .claim-btn.secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
    }

    @media (max-width: 520px) {
      .page {
        padding-top: 34px;
      }

      .card {
        border-radius: 22px;
      }

      .banner {
        height: 142px;
      }

      .avatar-wrap {
        padding: 0 18px;
      }

      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 22px;
      }

      .profile-header {
        flex-direction: column;
      }

      .card-body {
        padding: 16px 18px 22px;
      }

      .claim-card {
        padding: 34px 20px;
      }

      .claim-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="bg-animated" id="bgEl"></div>
<div class="noise"></div>

<div class="page">
  <div class="card" id="card">
    <div class="loading">
      <div class="loading-dot"></div>
      LOADING PROFILE...
    </div>
  </div>
  <div class="profile-footer">
    Powered by <a href="https://cordfol.org" target="_blank">CORDFOL.ORG</a> · Discord Identity, Verified.
  </div>
</div>

<script>
const SOCIAL_ICONS = {
  twitter: 'X',
  github: 'GH',
  youtube: 'YT',
  website: 'WEB',
  twitch: 'TW',
  instagram: 'IG',
  tiktok: 'TT',
  linkedin: 'in',
};

const API_BASE = 'https://api.cordfol.org/api';
const OAUTH_LOGIN_URL = 'https://api.cordfol.org/api/auth/discord';
const DASHBOARD_URL = 'https://dashboard.cordfol.org/dashboard.html';
const CLAIM_COOKIE_NAME = 'cordfol_claim_slug';

let audio = null;
let isPlaying = false;

function sanitizeSlug(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[^a-z0-9\-]/g, '')
    .replace(/^-+|-+$/g, '')
    .slice(0, 32);
}

function setClaimCookie(slug) {
  document.cookie = `${CLAIM_COOKIE_NAME}=${encodeURIComponent(slug)}; Max-Age=1800; Path=/; Domain=.cordfol.org; Secure; SameSite=Lax`;
}

function claimSlug(slug, destination = 'oauth') {
  const cleanSlug = sanitizeSlug(slug);
  if (!cleanSlug) return;
  setClaimCookie(cleanSlug);
  window.location.href = destination === 'dashboard'
    ? `${DASHBOARD_URL}?claim=${encodeURIComponent(cleanSlug)}`
    : OAUTH_LOGIN_URL;
}

function buildMissingProfileMarkup(slug) {
  const cleanSlug = sanitizeSlug(slug);
  if (!cleanSlug) {
    return `<div class="not-found"><h1>404</h1><p>Profile not found.</p></div>`;
  }

  return `
    <div class="claim-card">
      <div class="claim-eyebrow">This handle is open</div>
      <div class="not-found">
        <h1>CLAIM IT</h1>
        <p>No one has created <span class="claim-slug">cordfol.org/${cleanSlug}</span> yet.</p>
        <p>Log in with Discord and we’ll take you to the profile builder with this handle ready to claim.</p>
      </div>
      <div class="claim-actions">
        <button class="claim-btn" type="button" onclick="claimSlug('${cleanSlug}')">Claim This Handle</button>
        <button class="claim-btn secondary" type="button" onclick="claimSlug('${cleanSlug}', 'dashboard')">Open Dashboard</button>
      </div>
    </div>
  `;
}

function toggleMusic() {
  if (!audio) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('musicBtn').textContent = '▶';
    document.querySelectorAll('.music-bar').forEach(b => b.classList.add('paused'));
  } else {
    audio.muted = false;
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('musicBtn').textContent = '⏸';
      document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
    }).catch(err => console.error('Audio play failed:', err));
  }
}

async function renderProfile() {
  const url = new URL(window.location.href);
  const slug = sanitizeSlug(window.location.pathname.replace(/^\/+/, '').split('/')[0] || url.searchParams.get('slug') || '');
  if (!slug) {
    document.getElementById('card').innerHTML = `<div class="not-found"><h1>404</h1><p>Profile not found.</p></div>`;
    return;
  }

  let data;
  try {
    const res = await fetch(`${API_BASE}/profile/${slug}`);
    if (!res.ok) throw new Error('Not found');
    data = await res.json();
  } catch {
    document.getElementById('card').innerHTML = buildMissingProfileMarkup(slug);
    return;
  }

  const p = data.profile;
  const t = data.theme || {};
  const roles = data.roles || [];
  const activeRoleCount = roles.length;
  const botVerifiedCount = roles.filter(r => r.proofType === 'BOT').length;
  const oauthVerifiedCount = roles.filter(r => r.proofType === 'OAUTH').length;
  const socialLinks = (p.socialLinks && typeof p.socialLinks === 'object') ? p.socialLinks : {};

  // Apply theme
  const root = document.documentElement;
  root.style.setProperty('--bg', t.backgroundColor || '#0d0d0d');
  root.style.setProperty('--surface', t.cardColor || '#111');
  root.style.setProperty('--surface2', t.cardColor ? t.cardColor : '#181818');
  root.style.setProperty('--accent', t.accentColor || '#5865F2');
  root.style.setProperty('--text', t.textColor || '#f0f0f0');
  root.style.setProperty('--muted', t.textColor ? 'rgba(255,255,255,0.65)' : '#888');
  if (t.animatedBg) {
    document.getElementById('bgEl').style.background = `radial-gradient(circle at top left, ${t.accentColor || '#5865F2'} 0%, transparent 60%), radial-gradient(circle at bottom right, ${t.textColor || '#00FFB2'} 0%, transparent 55%)`;
  } else {
    document.getElementById('bgEl').style.background = t.backgroundColor || '#0d0d0d';
  }
  document.title = `${p.displayName} — Cordfol`;

  // Custom CSS
  if (t.customCss) {
    const style = document.createElement('style');
    style.innerHTML = t.customCss;
    document.head.appendChild(style);
  }

  // Music
  if (t.musicUrl) {
    console.log('[profile] Music URL:', t.musicUrl);
    
    // Validate URL is a direct audio file, not a YouTube link or other embed
    if (t.musicUrl.includes('youtube.com') || t.musicUrl.includes('youtu.be')) {
      console.error('[profile] YouTube URLs are not supported. Use a direct audio file URL (mp3, wav, ogg, etc)');
    } else {
      audio = new Audio(t.musicUrl);
      audio.loop = true;
      audio.crossOrigin = 'anonymous';
      audio.onerror = () => {
        console.error('[profile] Failed to load audio:', t.musicUrl);
      };
      audio.oncanplay = () => {
        console.log('[profile] Audio loaded successfully');
      };
      
      if (t.musicAutoplay) {
        audio.muted = true;
        audio.play().then(() => {
          audio.muted = false;
          isPlaying = true;
          document.getElementById('musicBtn').textContent = '⏸';
          document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
          console.log('[profile] Audio autoplay started');
        }).catch(err => console.error('Autoplay failed:', err));
      }
      const player = document.createElement('div');
      player.className = 'music-player';
      player.innerHTML = `
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">${isPlaying ? '⏸' : '▶'}</button>
        <div class="music-info">
          <div class="music-label">Now Playing</div>
          <div class="music-bars">
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:6px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:10px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:4px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:12px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:7px"></div>
          </div>
        </div>
      `;
      document.body.appendChild(player);
    }
  }

  // Roles HTML
  const rolesHtml = roles.length ? `
    <div class="divider"></div>
    <div class="roles-title">Verified Roles</div>
    <div class="roles-list">
      ${roles.map(r => `
        <div class="role-item">
          <div class="role-dot" style="background:${r.roleColor || t.accentColor || '#5865F2'}"></div>
          <div class="role-info">
            <div class="role-name">${r.roleName || r.roleId}</div>
                <div class="role-server">${r.guildName || 'Unknown Server'}</div>
          </div>
          <div class="role-proof ${r.proofType === 'BOT' ? 'bot' : ''}">${r.proofType === 'BOT' ? 'Bot Verified' : r.proofType === 'OAUTH' ? 'OAuth Verified' : r.proofType}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  // Socials HTML
  const socialsHtml = Object.entries(socialLinks).filter(([,v]) => v).length ? `
    <div class="divider"></div>
    <div class="socials">
      ${Object.entries(socialLinks).filter(([,v]) => v).map(([k, v]) => `
        <a href="${v}" target="_blank" rel="noopener noreferrer" class="social-link">
          ${SOCIAL_ICONS[k] || 'LINK'} ${k.charAt(0).toUpperCase() + k.slice(1)}
        </a>
      `).join('')}
    </div>
  ` : '';

  // Banner
  const bannerHtml = p.bannerUrl
    ? `<div class="banner"><img src="${p.bannerUrl}" alt="banner"/></div>`
    : `<div class="banner" style="background:linear-gradient(135deg, ${t.accentColor || '#5865F2'} 0%, #7C3AED 100%)"></div>`;

  document.getElementById('card').innerHTML = `
    ${bannerHtml}
    <div class="avatar-wrap">
      <img class="avatar" src="${p.avatarUrl || ''}" alt="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
    </div>
    <div class="card-body">
      <div class="profile-header">
        <div class="profile-heading">
          <div class="profile-kicker">Verified Discord profile</div>
          <div class="profile-name">${p.displayName}</div>
          <div class="profile-tag">cordfol.org/${p.slug}</div>
        </div>
      </div>
      ${p.bio ? `<div class="profile-bio">${p.bio}</div>` : ''}
      <div class="profile-summary">
        <div class="summary-chip"><strong>${activeRoleCount}</strong> Active roles</div>
        <div class="summary-chip"><strong>${botVerifiedCount}</strong> Bot proof</div>
        <div class="summary-chip"><strong>${oauthVerifiedCount}</strong> OAuth proof</div>
      </div>
      ${rolesHtml}
      ${socialsHtml}
    </div>
  `;
}

renderProfile();
</script>
</body>
</html>
