<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>Cordfol Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090d;
      --surface: #11131a;
      --surface2: #171922;
      --accent: #5865F2;
      --accent2: #7c5cff;
      --text: #f5f7fb;
      --muted: rgba(245,247,251,0.5);
      --neon: #00FFB2;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg);
      overflow: hidden;
    }
    .bg-animated::before,
    .bg-animated::after {
      content: none;
      display: none;
    }
    .bg-animated.show-orbs::before {
      content: '';
      display: block;
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      opacity: 0.15;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-animated.show-orbs::after {
      content: '';
      display: block;
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
      bottom: -200px;
      right: -200px;
      opacity: 0.08;
      animation: drift2 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 80px) scale(1.2); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-80px, -60px) scale(1.15); } }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 88px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(180deg, rgba(18,20,28,0.92), rgba(12,13,19,0.92));
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      animation: cardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88,101,242,0.14), transparent 34%, rgba(0,255,178,0.05));
      pointer-events: none;
    }
    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Layout variants ── */
    .page.layout-centered { align-items: center; }
    .page.layout-left { align-items: flex-start; padding-left: clamp(16px, 6vw, 72px); }
    .page.layout-card { align-items: center; }
    .page.layout-card .card {
      max-width: 680px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .page.layout-magazine { align-items: center; }
    .page.layout-magazine .card.magazine-layout { max-width: 640px; }
    .page.layout-magazine .card.magazine-layout .banner { height: 220px; }
    .page.layout-magazine .card.magazine-layout .avatar-wrap { margin-top: -58px; }
    .page.layout-magazine .card.magazine-layout .profile-name {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: -0.5px;
      font-weight: 400;
    }
    .page.layout-magazine .card.magazine-layout .card-body { padding-top: 10px; }

    /* ── Background media ── */
    .bg-media {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-media img,
    .bg-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bg-blur-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      pointer-events: none;
    }

    /* ── Particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(110vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    /* Falling styles: snow / rain / sakura */
    .particle.fall {
      animation-name: particleFall;
    }
    @keyframes particleFall {
      0% { transform: translateY(-8vh) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: var(--p-opacity, 0.8); }
      100% { transform: translateY(110vh) translateX(var(--sway, 30px)) rotate(var(--spin, 0deg)); opacity: 0.2; }
    }
    .particle.firefly {
      animation-name: fireflyDrift;
      animation-timing-function: ease-in-out;
      animation-direction: alternate;
    }
    @keyframes fireflyDrift {
      0%   { transform: translate(0, 0); opacity: 0.1; }
      25%  { opacity: 0.9; }
      50%  { transform: translate(var(--dx, 40px), var(--dy, -60px)); opacity: 0.25; }
      75%  { opacity: 1; }
      100% { transform: translate(calc(var(--dx, 40px) * -0.6), calc(var(--dy, -60px) * 0.4)); opacity: 0.15; }
    }

    /* ── Card glass ── */
    .card.glass {
      background: rgba(var(--card-rgb, 17,17,17), var(--card-alpha, 0.92));
    }

    /* ── Banner ── */
    .banner {
      width: 100%;
      height: 170px;
      background: linear-gradient(135deg, var(--accent), var(--accent2) 48%, var(--neon) 100%);
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }
    .banner img,
    .banner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      display: flex;
      justify-content: flex-start;
      margin-top: -52px;
      position: relative;
      z-index: 2;
      padding: 0 26px;
    }
    .avatar {
      width: 106px;
      height: 106px;
      border-radius: 28px;
      border: 4px solid rgba(9,9,13,0.92);
      background: #222;
      object-fit: cover;
      box-shadow: 0 14px 36px rgba(0,0,0,0.42);
    }

    /* ── Body ── */
    .card-body {
      padding: 18px 26px 28px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .profile-heading {
      min-width: 0;
    }

    .profile-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .profile-kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(var(--accent-rgb, 88,101,242), 0.45);
    }

    .cf-verified-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(var(--accent-rgb, 88,101,242), 0.2);
      color: var(--accent);
      font-size: 9px;
      font-weight: 700;
    }

    .profile-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Name effects ── */
    .fx-name-glow {
      text-shadow: 0 0 12px rgba(var(--accent-rgb), 0.85), 0 0 34px rgba(var(--accent-rgb), 0.45);
    }
    .fx-name-gradient {
      background: linear-gradient(90deg, var(--accent), var(--text) 55%, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .fx-name-rainbow {
      background: linear-gradient(90deg, #ff5f6d, #ffc371, #47e891, #4facfe, #b06ab3, #ff5f6d);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      animation: nameRainbow 6s linear infinite;
    }
    @keyframes nameRainbow { to { background-position: 300% 0; } }
    .fx-name-sparkle {
      text-shadow: 0 0 10px rgba(var(--accent-rgb), 0.6);
      animation: nameSparkle 2.4s ease-in-out infinite;
    }
    @keyframes nameSparkle {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.4); text-shadow: 0 0 18px rgba(var(--accent-rgb), 0.9); }
    }

    /* ── Featured Discord server card ── */
    .server-card {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(var(--accent-rgb), 0.07);
      text-align: left;
    }
    .server-card-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      flex-shrink: 0;
      object-fit: cover;
      background: rgba(255,255,255,0.08);
    }
    .server-card-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 3px;
    }
    .server-card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .server-online-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3ba55d;
      margin-right: 4px;
    }
    .server-join-btn {
      margin-left: auto;
      flex-shrink: 0;
      padding: 9px 16px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      transition: transform 0.15s, filter 0.15s;
    }
    .server-join-btn:hover { transform: translateY(-1px); filter: brightness(1.15); }

    /* ── Guestbook ── */
    .gb-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; text-align: left; }
    .gb-entry {
      display: flex;
      gap: 10px;
      padding: 11px 13px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      position: relative;
    }
    .gb-entry.pinned { border-color: rgba(var(--accent-rgb), 0.5); background: rgba(var(--accent-rgb), 0.07); }
    .gb-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
    .gb-body { min-width: 0; flex: 1; }
    .gb-author { font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .gb-author a { color: var(--text); text-decoration: none; }
    .gb-author a:hover { color: var(--accent); }
    .gb-time { font-size: 0.66rem; color: var(--muted); font-weight: 400; }
    .gb-msg { font-size: 0.83rem; color: var(--text); opacity: 0.9; margin-top: 3px; word-wrap: break-word; }
    .gb-pin-tag { font-size: 0.62rem; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; }
    .gb-actions { display: flex; gap: 6px; align-items: flex-start; }
    .gb-action-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.75rem; padding: 2px 4px;
      border-radius: 6px; transition: color 0.15s;
    }
    .gb-action-btn:hover { color: var(--text); }
    .gb-form { display: flex; gap: 8px; margin-top: 14px; }
    .gb-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: var(--text);
      padding: 10px 13px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    .gb-input:focus { border-color: var(--accent); }
    .gb-submit, .gb-signin {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, filter 0.15s;
    }
    .gb-submit:hover, .gb-signin:hover { transform: translateY(-1px); filter: brightness(1.15); }
    .gb-signin-row { margin-top: 14px; display: flex; justify-content: center; }
    .gb-empty { font-size: 0.8rem; color: var(--muted); margin-top: 12px; }

    /* ── Profile badges ── */
    .badge-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .p-badge {
      position: relative;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      cursor: default;
      transition: transform 0.15s;
    }
    .p-badge:hover { transform: translateY(-2px) scale(1.12); }
    .p-badge::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: #1b1c26;
      border: 1px solid rgba(255,255,255,0.12);
      color: #f5f7fb;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      padding: 5px 9px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 30;
    }
    .p-badge:hover::after { opacity: 1; }
    .p-badge.b-creator { background: linear-gradient(135deg, #FFD700, #FF8C00); border-color: rgba(255,215,0,0.5); }
    .p-badge.b-pro { background: linear-gradient(135deg, #7c5cff, #5865F2); border-color: rgba(124,92,255,0.5); }
    .p-badge.b-early { background: linear-gradient(135deg, #00FFB2, #00bf8f); border-color: rgba(0,255,178,0.4); }
    .p-badge.b-views1k, .p-badge.b-views10k { background: linear-gradient(135deg, #FF3366, #FF8C00); border-color: rgba(255,51,102,0.45); }
    .p-badge.b-bot { background: linear-gradient(135deg, #5865F2, #3b4170); border-color: rgba(88,101,242,0.5); }
    .p-badge.b-music { background: linear-gradient(135deg, #1DB954, #14833b); border-color: rgba(29,185,84,0.45); }

    /* ── Avatar accent ring ── */
    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 33px;
      background: conic-gradient(from 0deg, var(--accent), transparent 30%, var(--accent) 55%, transparent 80%, var(--accent));
      animation: ringSpin 6s linear infinite;
      z-index: -1;
      opacity: 0.85;
    }
    .avatar-holder { position: relative; display: inline-block; }
    @keyframes ringSpin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .avatar-ring { animation: none; } }

    /* ── Share modal ── */
    .share-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5,5,8,0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 20px;
    }
    .share-modal.open { display: flex; }
    .share-card {
      width: 100%;
      max-width: 340px;
      background: #14151d;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 26px;
      text-align: center;
      animation: cardSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .share-card h3 {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,247,251,0.55);
      margin-bottom: 18px;
    }
    .share-qr {
      width: 210px;
      height: 210px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0b0b10;
      margin: 0 auto 16px;
      display: block;
    }
    .share-url {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
      word-break: break-all;
    }
    .share-actions { display: flex; gap: 8px; }
    .share-btn2 {
      flex: 1;
      padding: 11px 0;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #f5f7fb;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .share-btn2:hover { background: rgba(255,255,255,0.1); }
    .share-btn2.primary { background: var(--accent); border-color: transparent; }
    .share-btn2.primary:hover { filter: brightness(1.12); }

    .verified-crown {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
      animation: crownPulse 2s ease-in-out infinite;
    }

    @keyframes crownPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .profile-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .profile-tag:hover {
      border-color: rgba(var(--accent-rgb, 88,101,242), 0.35);
      background: rgba(var(--accent-rgb, 88,101,242), 0.08);
    }

    .profile-bio {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 18px;
      max-width: 48ch;
    }

    .profile-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(245,247,251,0.72);
    }

    .summary-chip strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0 0 20px;
    }

    /* ── Roles ── */
    .roles-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      text-align: left;
    }

    .roles-list {

function trackEvent(type, label, platform) {
  const slug = window._profileSlug;
  if (!slug) return;
  const payload = JSON.stringify({ slug, type, label, platform });
  try {
    navigator.sendBeacon(`${API_BASE}/analytics/event`, new Blob([payload], { type: 'application/json' }));
  } catch {
    fetch(`${API_BASE}/analytics/event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: payload,
      keepalive: true,
    }).catch(() => {});
  }
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatCount(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function animateViewCount(el, target) {
  if (!el || !target || target <= 0) return;
  const duration = 900;
  const start = performance.now();
  const tick = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = formatCount(Math.round(target * eased));
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function hexToRgb(hex) {
  const clean = String(hex || '#111111').replace('#', '');
  if (clean.length !== 6) return '17,17,17';
  return [
    parseInt(clean.slice(0, 2), 16),
    parseInt(clean.slice(2, 4), 16),
    parseInt(clean.slice(4, 6), 16),
  ].join(',');
}

function isVideoUrl(url) {
  return /\.(mp4|webm|ogg)(\?|$)/i.test(url) || String(url || '').startsWith('data:video');
}

function isGradientValue(value) {
  return String(value || '').includes('gradient(');
}

function buildSocialUrl(platform, value) {
  if (!value || !String(value).trim()) return null;
  const v = String(value).trim();
  if (/^https?:\/\//i.test(v)) return v;
  const handle = v.replace(/^@/, '');
  const map = {
    twitter: `https://x.com/${handle}`,
    github: `https://github.com/${handle}`,
    youtube: `https://youtube.com/@${handle}`,
    tiktok: `https://tiktok.com/@${handle}`,
    instagram: `https://instagram.com/${handle}`,
  };
  if (map[platform]) return map[platform];
  if (platform === 'website') return v.includes('.') ? (v.startsWith('http') ? v : `https://${v}`) : null;
  return null;
}

function applyFont(fontName) {
  const fontMap = {
    'DM Sans': "'DM Sans', sans-serif",
    'Space Mono': "'Space Mono', monospace",
    'Bebas Neue': "'Bebas Neue', sans-serif",
    'Instrument Serif': "'Instrument Serif', serif",
    'Syne': "'Syne', sans-serif",
    'IBM Plex Mono': "'IBM Plex Mono', monospace",
  };
  document.body.style.fontFamily = fontMap[fontName] || fontMap['DM Sans'];
}

function applyLayout(layout) {
  const page = document.querySelector('.page');
  const card = document.getElementById('card');
  page.classList.remove('layout-centered', 'layout-left', 'layout-card', 'layout-magazine');
  page.classList.add(`layout-${layout || 'centered'}`);
  if (card) card.classList.toggle('magazine-layout', layout === 'magazine');
}

function isGifUrl(url) {
  return /\.gif(\?|$)/i.test(url) || String(url || '').startsWith('data:image/gif');
}

function applyBackground(theme) {
  const bgEl = document.getElementById('bgEl');
  const bgMedia = document.getElementById('bgMedia');
  const bgBlur = document.getElementById('bgBlurLayer');
  bgMedia.innerHTML = '';
  bgEl.classList.remove('show-orbs');

  let bgType = theme.bgType || 'solid';
  const bgValue = theme.bgValue || '';
  const accent = theme.accentColor || '#5865F2';

  if ((bgType === 'solid' || bgType === 'gradient') && bgValue) {
    if (isVideoUrl(bgValue)) bgType = 'video';
    else if (isGifUrl(bgValue)) bgType = 'gif';
  }

  if (bgType === 'gif' || bgType === 'video') {
    bgEl.style.background = '#09090d';
    const media = document.createElement(bgType === 'video' || isVideoUrl(bgValue) ? 'video' : 'img');
    media.src = bgValue;
    if (media.tagName === 'VIDEO') {
      media.autoplay = true;
      media.muted = true;
      media.loop = true;
      media.playsInline = true;
    }
    bgMedia.appendChild(media);
  } else if (bgType === 'gradient' || isGradientValue(bgValue) || isGradientValue(theme.backgroundColor)) {
    bgEl.style.background = bgValue || theme.backgroundColor;
    if (theme.animatedBg) bgEl.classList.add('show-orbs');
  } else {
    bgEl.style.background = bgValue || theme.backgroundColor || '#0d0d0d';
    if (theme.animatedBg) bgEl.classList.add('show-orbs');
  }

  bgBlur.style.display = theme.bgBlur ? 'block' : 'none';
}

function applyCardTheme(theme) {
  const card = document.getElementById('card');
  const cardColor = theme.cardColor || '#111111';
  const cardOpacity = theme.cardOpacity != null
    ? (Number(theme.cardOpacity) > 1 ? Number(theme.cardOpacity) / 100 : Number(theme.cardOpacity))
    : 0.92;
  const glassOn = theme.glassmorphism || theme.glassEnabled;

  document.documentElement.style.setProperty('--card-rgb', hexToRgb(cardColor));
  document.documentElement.style.setProperty('--card-alpha', String(cardOpacity));

  if (glassOn) {
    card.classList.add('glass');
    card.style.backdropFilter = `blur(${theme.glassBlur || 18}px)`;
    card.style.webkitBackdropFilter = `blur(${theme.glassBlur || 18}px)`;
  } else {
    card.classList.remove('glass');
    const rgb = hexToRgb(cardColor);
    card.style.background = `linear-gradient(180deg, rgba(${rgb},${cardOpacity}), rgba(${rgb},${Math.max(cardOpacity - 0.08, 0.5)}))`;
    card.style.backdropFilter = '';
  }
}

function initParticles(enabled, accent, style) {
  const el = document.getElementById('particlesEl');
  el.innerHTML = '';
  if (!enabled) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  style = style || 'dots';
  const count = style === 'rain' ? 44 : 28;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = `${Math.random() * 100}%`;

    if (style === 'snow') {
      const size = 3 + Math.random() * 4;
      p.classList.add('fall');
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.background = 'rgba(255,255,255,0.85)';
      p.style.filter = 'blur(0.5px)';
      p.style.setProperty('--sway', `${-40 + Math.random() * 80}px`);
      p.style.setProperty('--p-opacity', 0.5 + Math.random() * 0.5);
      p.style.animationDuration = `${7 + Math.random() * 10}s`;
    } else if (style === 'rain') {
      p.classList.add('fall');
      p.style.width = '1.5px';
      p.style.height = `${10 + Math.random() * 12}px`;
      p.style.borderRadius = '2px';
      p.style.background = 'linear-gradient(to bottom, transparent, rgba(174,194,224,0.6))';
      p.style.setProperty('--sway', `${-8 + Math.random() * 16}px`);
      p.style.setProperty('--p-opacity', 0.4 + Math.random() * 0.4);
      p.style.animationDuration = `${0.7 + Math.random() * 0.9}s`;
    } else if (style === 'sakura') {
      const size = 6 + Math.random() * 6;
      p.classList.add('fall');
      p.style.width = `${size}px`;
      p.style.height = `${size * 0.85}px`;
      p.style.borderRadius = '60% 0 60% 0';
      p.style.background = ['#ffb7c5', '#ffc9d6', '#f8a1b5'][i % 3];
      p.style.setProperty('--sway', `${-70 + Math.random() * 140}px`);
      p.style.setProperty('--spin', `${180 + Math.random() * 540}deg`);
      p.style.setProperty('--p-opacity', 0.6 + Math.random() * 0.4);
      p.style.animationDuration = `${8 + Math.random() * 9}s`;
    } else if (style === 'fireflies') {
      const size = 3 + Math.random() * 3;
      p.classList.add('firefly');
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.top = `${Math.random() * 100}%`;
      const glow = accent || '#ffe28a';
      p.style.background = '#fff7d6';
      p.style.boxShadow = `0 0 ${6 + size * 2}px ${glow}`;
      p.style.setProperty('--dx', `${-70 + Math.random() * 140}px`);
      p.style.setProperty('--dy', `${-70 + Math.random() * 140}px`);
      p.style.animationDuration = `${4 + Math.random() * 6}s`;
      p.style.animationIterationCount = 'infinite';
    } else {
      const size = 2 + Math.random() * 4;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.background = accent || 'rgba(255,255,255,0.35)';
      p.style.animationDuration = `${8 + Math.random() * 14}s`;
    }

    p.style.animationDelay = `${Math.random() * 10}s`;
    if (p.classList.contains('fall')) p.style.animationIterationCount = 'infinite';
    el.appendChild(p);
  }
}

function buildBannerHtml(bannerUrl, accentColor) {
  const accent = accentColor || '#5865F2';
  if (!bannerUrl) {
    return `<div class="banner" style="background:linear-gradient(135deg, ${accent} 0%, #7C3AED 100%)"></div>`;
  }
  if (isGradientValue(bannerUrl)) {
    return `<div class="banner" style="background:${bannerUrl}"></div>`;
  }
  if (isVideoUrl(bannerUrl)) {
    return `<div class="banner"><video autoplay muted loop playsinline src="${escapeHtml(bannerUrl)}"></video></div>`;
  }
  return `<div class="banner"><img src="${escapeHtml(bannerUrl)}" alt="banner"/></div>`;
}

function sanitizeSlug(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[^a-z0-9\-]/g, '')
    .replace(/^-+|-+$/g, '')
    .slice(0, 32);
}

function setClaimCookie(slug) {
  document.cookie = `${CLAIM_COOKIE_NAME}=${encodeURIComponent(slug)}; Max-Age=1800; Path=/; Domain=.cordfol.org; Secure; SameSite=Lax`;
}

function claimSlug(slug, destination = 'oauth') {
  const cleanSlug = sanitizeSlug(slug);
  if (!cleanSlug) return;
  setClaimCookie(cleanSlug);
  window.location.href = destination === 'dashboard'
    ? `${DASHBOARD_URL}?claim=${encodeURIComponent(cleanSlug)}`
    : OAUTH_LOGIN_URL;
}

function showCopyToast(text) {
  const existingToast = document.querySelector('.copy-toast');
  if (existingToast) existingToast.remove();
  
  const toast = document.createElement('div');
  toast.className = 'copy-toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  
  setTimeout(() => toast.remove(), 2000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showCopyToast('✓ Copied to clipboard!');
  }).catch(() => {
    showCopyToast('Failed to copy');
  });
}

function buildMissingProfileMarkup(slug) {
  const cleanSlug = sanitizeSlug(slug);
  if (!cleanSlug) {
    return `<div class="not-found"><h1>404</h1><p>Profile not found.</p></div>`;
  }

  return `
    <div class="claim-card">
      <div class="claim-eyebrow">This handle is open</div>
      <div class="not-found">
        <h1>CLAIM IT</h1>
        <p>No one has created <span class="claim-slug">cordfol.org/${cleanSlug}</span> yet.</p>
        <p>Log in with Discord and we’ll take you to the profile builder with this handle ready to claim.</p>
      </div>
      <div class="claim-actions">
        <button class="claim-btn" type="button" onclick="claimSlug('${cleanSlug}')">Claim This Handle</button>
        <button class="claim-btn secondary" type="button" onclick="claimSlug('${cleanSlug}', 'dashboard')">Open Dashboard</button>
      </div>
    </div>
  `;
}

function toggleMusic() {
  if (!audio) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('musicBtn').textContent = '▶';
    document.querySelectorAll('.music-bar').forEach(b => b.classList.add('paused'));
  } else {
    audio.muted = false;
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('musicBtn').textContent = '⏸';
      document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
      startVisualizer();
    }).catch(err => console.error('Audio play failed:', err));
  }
}

function localTimeIn(tz) {
  try {
    return new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit', timeZone: tz }).format(new Date());
  } catch { return null; }
}
function startLocalClock(tz) {
  setInterval(() => {
    const el = document.getElementById('localTimeVal');
    const now = localTimeIn(tz);
    if (el && now) el.textContent = now;
  }, 30000);
}

// ── Audio visualizer: bars react to the actual music ──
let _viz = null;
let _vizCtx = null;
function startVisualizer() {
  if (!audio || _viz) return;
  try {
    if (!_vizCtx) _vizCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Only reroute the audio once the context is running, otherwise the
    // MediaElementSource would silence playback on autoplay-restricted pages.
    if (_vizCtx.state !== 'running') {
      _vizCtx.resume().then(() => { if (_vizCtx.state === 'running') startVisualizer(); }).catch(() => {});
      document.addEventListener('pointerdown', () => {
        _vizCtx.resume().then(() => { if (_vizCtx.state === 'running') startVisualizer(); }).catch(() => {});
      }, { once: true });
      return;
    }
    const src = _vizCtx.createMediaElementSource(audio);
    const analyser = _vizCtx.createAnalyser();
    analyser.fftSize = 64;
    src.connect(analyser);
    analyser.connect(_vizCtx.destination);
    _viz = { analyser, data: new Uint8Array(analyser.frequencyBinCount) };
    const bars = Array.from(document.querySelectorAll('.music-bar'));
    bars.forEach(b => { b.style.animation = 'none'; b.style.transition = 'height 0.08s linear'; });
    (function frame() {
      requestAnimationFrame(frame);
      if (!isPlaying) return;
      _viz.analyser.getByteFrequencyData(_viz.data);
      const step = Math.floor(_viz.data.length / bars.length) || 1;
      bars.forEach((b, i) => {
        const v = _viz.data[i * step] / 255;
        b.style.height = `${Math.max(3, Math.round(3 + v * 13))}px`;
      });
    })();
  } catch (err) {
    // CORS or unsupported browser: keep the CSS-animated bars
    console.warn('[profile] Visualizer unavailable:', err.message);
  }
}

function getStoredSid() {
  try { return sessionStorage.getItem('cordfol_sid') || ''; } catch { return ''; }
}

async function renderProfile() {
  const url = new URL(window.location.href);

  // Coming back from Discord OAuth (guestbook sign-in): stash the sid, clean the URL
  const sidParam = url.searchParams.get('sid');
  if (sidParam) {
    try { sessionStorage.setItem('cordfol_sid', sidParam); } catch {}
    url.searchParams.delete('sid');
    history.replaceState({}, '', url.pathname + (url.search || ''));
  }

  const slug = sanitizeSlug(window.location.pathname.replace(/^\/+/, '').split('/')[0] || url.searchParams.get('slug') || '');
  if (!slug) {
    document.getElementById('card').innerHTML = `<div class="not-found"><h1>404</h1><p>Profile not found.</p></div>`;
    return;
  }

  let data;
  try {
    const res = await fetch(`${API_BASE}/profile/${slug}`);
    if (!res.ok) throw new Error('Not found');
    data = await res.json();
  } catch {
    document.getElementById('card').innerHTML = buildMissingProfileMarkup(slug);
    return;
  }

  const p = data.profile;
  window._profileSlug = p.slug || slug;
  const t = data.theme || {};
  const disp = Object.assign({
    showVerifiedBadge: true,
    showHandle: true,
    showPresence: true,
    showBio: true,
    showCustomLinks: true,
    showViews: true,
    showMemberSince: true,
    showRoleStats: true,
    showRoles: true,
    showSocials: true,
    showSpotifyWidget: true,
  }, p.displayOptions || {});
  const roles = data.roles || [];
  const activeRoleCount = roles.length;
  const botVerifiedCount = roles.filter(r => r.proofType === 'BOT').length;
  const oauthVerifiedCount = roles.filter(r => r.proofType === 'OAUTH').length;
  const socialLinks = (p.socialLinks && typeof p.socialLinks === 'object') ? p.socialLinks : {};

  // Store for action buttons
  window.currentProfile = {
    displayName: p.displayName,
    slug: p.slug,
    discordId: p.discordId,
    isExclusive: p.discordId === EXCLUSIVE_USER_ID
  };

  // Setup action buttons
  document.getElementById('copyBtn').onclick = () => {
    copyToClipboard(`cordfol.org/${p.slug}`);
    trackEvent('share', 'Copy link');
  };
  document.getElementById('shareBtn').onclick = () => {
    const url = `${window.location.origin}/${p.slug}`;
    trackEvent('share', 'Share button');
    const modal = document.getElementById('shareModal');
    document.getElementById('shareQr').src = `${API_BASE}/qr/${encodeURIComponent(p.slug)}`;
    document.getElementById('shareUrl').textContent = `cordfol.org/${p.slug}`;
    document.getElementById('shareCopyBtn').onclick = () => {
      copyToClipboard(url);
      trackEvent('share', 'Copy link (modal)');
    };
    const nativeBtn = document.getElementById('shareNativeBtn');
    if (navigator.share) {
      nativeBtn.style.display = '';
      nativeBtn.onclick = () => navigator.share({ title: `${p.displayName}'s Cordfol`, url }).catch(() => {});
    } else {
      nativeBtn.style.display = 'none';
    }
    modal.classList.add('open');
  };
  document.getElementById('shareModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('shareModal').classList.remove('open');
  });

  // Apply theme
  const root = document.documentElement;
  root.style.setProperty('--bg', t.backgroundColor || '#0d0d0d');
  root.style.setProperty('--surface', t.cardColor || '#111');
  root.style.setProperty('--surface2', t.cardColor ? t.cardColor : '#181818');
  root.style.setProperty('--accent', t.accentColor || '#5865F2');
  root.style.setProperty('--text', t.textColor || '#f0f0f0');
  root.style.setProperty('--muted', t.textColor ? 'rgba(255,255,255,0.65)' : '#888');
  root.style.setProperty('--accent-rgb', hexToRgb(t.accentColor || '#5865F2'));

  applyFont(t.font || 'DM Sans');
  applyLayout(t.layout || 'centered');
  applyBackground(t);
  applyCardTheme(t);
  initParticles(t.particles, t.accentColor, t.particleStyle);
  document.title = `${p.displayName} — Cordfol`;

  // Custom CSS
  if (t.customCss) {
    const style = document.createElement('style');
    style.innerHTML = t.customCss;
    document.head.appendChild(style);
  }

  // Music
  if (t.musicUrl) {
    console.log('[profile] Music URL:', t.musicUrl);
    
    // Validate URL is a direct audio file, not a YouTube link or other embed
    if (t.musicUrl.includes('youtube.com') || t.musicUrl.includes('youtu.be')) {
      console.error('[profile] YouTube URLs are not supported. Use a direct audio file URL (mp3, wav, ogg, etc)');
    } else {
      audio = new Audio(t.musicUrl);
      audio.loop = true;
      audio.crossOrigin = 'anonymous';
      audio.onerror = () => {
        console.error('[profile] Failed to load audio:', t.musicUrl);
      };
      audio.oncanplay = () => {
        console.log('[profile] Audio loaded successfully');
      };
      
      if (t.musicAutoplay && !t.entrySplash) {
        audio.muted = true;
        audio.play().then(() => {
          audio.muted = false;
          isPlaying = true;
          document.getElementById('musicBtn').textContent = '⏸';
          document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
          startVisualizer();
          console.log('[profile] Audio autoplay started');
        }).catch(err => console.error('Autoplay failed:', err));
      }
      const player = document.createElement('div');
      player.className = 'music-player';
      player.innerHTML = `
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">${isPlaying ? '⏸' : '▶'}</button>
        <div class="music-info">
          <div class="music-label">Now Playing</div>
          <div class="music-bars">
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:6px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:10px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:4px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:12px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:7px"></div>
          </div>
        </div>
      `;
      document.body.appendChild(player);
    }
  }

  // Roles HTML
  const rolesHtml = (disp.showRoles && roles.length) ? `
    <div class="divider"></div>
    <div class="roles-title">Verified Roles</div>
    <div class="roles-list">
      ${roles.map(r => {
        const roleColor = r.roleColor || null;
        const styleAttr = roleColor ? ` style="--role-color: ${escapeHtml(roleColor)}"` : '';
        return `
        <div class="role-item"${styleAttr}>
          <div class="role-icon" ${r.guildIconHash ? `style="background-image: url('https://cdn.discordapp.com/icons/${r.guildId}/${r.guildIconHash}.png'); background-size: cover; background-position: center;"` : ''}>
            ${!r.guildIconHash ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-8a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v8"/><path d="M3 21V7l4-4 5 4 5-4 4 4v14"/><path d="M1 21h22"/></svg>' : ''}
          </div>
          <div class="role-info">
            <div class="role-name">
              ${roleColor ? `<span class="role-color-dot"></span>` : ''}
              <span>${escapeHtml(r.roleName || r.roleId)}</span>
              ${r.isPinned ? '<span class="role-pin-tag">Pinned</span>' : ''}
            </div>
            <div class="role-server">${escapeHtml(r.guildName || 'Unknown Server')}</div>
          </div>
          <div class="role-proof ${r.proofType === 'BOT' ? 'bot' : ''}">${r.proofType === 'BOT' ? 'Bot Verified' : r.proofType === 'OAUTH' ? 'OAuth Verified' : escapeHtml(r.proofType)}</div>
        </div>`;
      }).join('')}
    </div>
  ` : '';

  // Socials HTML
  const socialEntries = Object.entries(socialLinks)
    .map(([k, v]) => [k, buildSocialUrl(k, v)])
    .filter(([, url]) => url);

  const socialsHtml = (disp.showSocials && socialEntries.length) ? `
    <div class="divider"></div>
    <div class="socials">
      ${socialEntries.map(([k, url]) => `
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="social-link ${k}" title="${SOCIAL_NAMES[k] || 'Link'}" onclick="trackEvent('link_click','${escapeHtml(SOCIAL_NAMES[k] || k)}','${escapeHtml(k)}')">
          <span style="display:inline-flex">${SOCIAL_ICONS[k] || SOCIAL_ICONS.website}</span>
          <span>${SOCIAL_NAMES[k] || 'Link'}</span>
        </a>
      `).join('')}
    </div>
  ` : '';

  // Custom link blocks
  const customLinks = Array.isArray(p.customLinks) ? p.customLinks.filter(l => l && l.title && l.url) : [];
  const customLinksHtml = (disp.showCustomLinks && customLinks.length) ? `
    <div class="custom-links">
      ${customLinks.map(l => `
        <a class="custom-link-block" href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer" onclick="trackEvent('link_click','${escapeHtml(l.title)}','custom')">${escapeHtml(l.title)}</a>
      `).join('')}
    </div>
  ` : '';

  const bannerHtml = buildBannerHtml(p.bannerUrl, t.accentColor);

  const presence = (disp.showPresence && data.presence && !data.presence.stale) ? data.presence : null;
  const presenceTitles = { online: 'Online', idle: 'Idle', dnd: 'Do Not Disturb', offline: 'Offline' };
  const presenceDotHtml = presence
    ? `<div class="presence-dot presence-${escapeHtml(presence.status)}" title="${presenceTitles[presence.status] || ''}"></div>`
    : '';
  const presenceActivityHtml = (presence && presence.activity && presence.status !== 'offline')
    ? `<div class="presence-activity"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="flex-shrink:0"><path d="M21.58 16.09l-1.09-7.66A4.996 4.996 0 0 0 15.54 4H8.46C6 4 3.9 5.83 3.51 8.43l-1.09 7.66a3.16 3.16 0 0 0 5.35 2.72L10.17 16h3.66l2.4 2.81a3.16 3.16 0 0 0 5.35-2.72zM11 11H9v2H8v-2H6v-1h2V8h1v2h2v1zm4-1.5a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm2 3.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg> ${escapeHtml(presence.activity)}</div>`
    : '';

  // Profile badges (computed server-side)
  const BADGE_ICONS = {
    creator: '👑',
    pro: '⚡',
    early: '🌱',
    views1k: '🔥',
    views10k: '💎',
    bot: '🤖',
    music: '🎵',
  };
  const badgeList = (disp.showBadges !== false && Array.isArray(p.badges)) ? p.badges : [];
  const badgesHtml = badgeList.length ? `
    <span class="badge-row">
      ${badgeList.map(b => `<span class="p-badge b-${escapeHtml(b.id)}" data-label="${escapeHtml(b.label)}">${BADGE_ICONS[b.id] || '★'}</span>`).join('')}
    </span>
  ` : '';

  const summaryChips = [];
  if (disp.showViews && p.viewCount) {
    summaryChips.push(`<div class="summary-chip"><strong id="viewCountNum">0</strong> Views</div>`);
  }
  if (disp.showMemberSince && p.memberSince) {
    summaryChips.push(`<div class="summary-chip"><strong>${escapeHtml(p.memberSince)}</strong> on Discord</div>`);
  }
  if (disp.showLocalTime !== false && p.timezone) {
    const localNow = localTimeIn(p.timezone);
    if (localNow) summaryChips.push(`<div class="summary-chip"><strong id="localTimeVal">${escapeHtml(localNow)}</strong> local time</div>`);
  }
  if (disp.showRoleStats) {
    summaryChips.push(`<div class="summary-chip"><strong>${activeRoleCount}</strong> Active roles</div>`);
    summaryChips.push(`<div class="summary-chip"><strong>${botVerifiedCount}</strong> Bot proof</div>`);
    summaryChips.push(`<div class="summary-chip"><strong>${oauthVerifiedCount}</strong> OAuth proof</div>`);
  }
  const summaryHtml = summaryChips.length
    ? `<div class="profile-summary">${summaryChips.join('')}</div>`
    : '';

  // Featured Discord server (live counts resolved server-side from the invite)
  const fs = p.featuredServer;
  const serverCardHtml = (disp.showServerCard !== false && fs) ? `
    <div class="server-card">
      ${fs.iconUrl ? `<img class="server-card-icon" src="${escapeHtml(fs.iconUrl)}" alt=""/>` : `<div class="server-card-icon" style="display:flex;align-items:center;justify-content:center;font-size:20px">💬</div>`}
      <div style="min-width:0">
        <div class="server-card-name">${escapeHtml(fs.name)}</div>
        <div class="server-card-meta">
          <span><span class="server-online-dot"></span>${formatCount(fs.online)} online</span>
          <span>${formatCount(fs.members)} members</span>
        </div>
      </div>
      <a class="server-join-btn" href="${escapeHtml(fs.inviteUrl)}" target="_blank" rel="noopener noreferrer" onclick="trackEvent('link_click','Discord Server','discord')">Join</a>
    </div>
  ` : '';

  const guestbookShellHtml = (disp.showGuestbook !== false) ? `
    <div class="divider"></div>
    <div class="roles-title">Guestbook</div>
    <div id="gbSection"><div class="gb-empty">Loading…</div></div>
  ` : '';

  document.getElementById('card').innerHTML = `
    ${bannerHtml}
    <div class="avatar-wrap">
      <div class="avatar-holder">
        <div class="avatar-ring"></div>
        <img class="avatar" src="${escapeHtml(p.avatarUrl || '')}" alt="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
        ${presenceDotHtml}
      </div>
    </div>
    <div class="card-body">
      <div class="profile-header">
        <div class="profile-heading">
          ${disp.showVerifiedBadge ? '<div class="profile-kicker"><span class="cf-verified-mark">✓</span> Verified by Cordfol</div>' : ''}
          <div class="profile-name">
            <span class="${t.nameEffect && t.nameEffect !== 'none' ? `fx-name-${escapeHtml(t.nameEffect)}` : ''}">${escapeHtml(p.displayName)}</span>
            ${badgesHtml}
          </div>
          ${disp.showHandle ? `<div class="profile-tag" id="profileTag" title="Click to copy link">cordfol.org/${escapeHtml(p.slug)}</div>` : ''}
          ${presenceActivityHtml}
        </div>
      </div>
      ${disp.showBio && p.bio ? `<div class="profile-bio" id="profileBio">${escapeHtml(p.bio)}</div>` : ''}
      <div id="spotifySlot"></div>
      ${serverCardHtml}
      ${customLinksHtml}
      ${summaryHtml}
      ${rolesHtml}
      ${socialsHtml}
      ${guestbookShellHtml}
    </div>
  `;

  if (disp.showSpotifyWidget && p.spotify?.public) {
    initSpotifyWidget(p.slug);
  }

  if (t.typewriterBio && disp.showBio && p.bio) initTypewriter(p.bio);
  if (t.tiltCard) initTilt();
  if (t.entrySplash) showEntrySplash(p, !!t.musicAutoplay);

  const tagEl = document.getElementById('profileTag');
  if (tagEl && disp.showHandle) {
    tagEl.addEventListener('click', () => {
      copyToClipboard(`cordfol.org/${p.slug}`);
      trackEvent('share', 'Copy handle');
    });
  }
  if (disp.showViews && p.viewCount) animateViewCount(document.getElementById('viewCountNum'), p.viewCount);
  if (disp.showLocalTime !== false && p.timezone) startLocalClock(p.timezone);
  if (disp.showGuestbook !== false) initGuestbook(p.slug);
}

// ── Guestbook ──
function gbTimeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  if (s < 2592000) return `${Math.floor(s / 86400)}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function gbFetchOpts() {
  return { credentials: 'include' };
}
function gbUrl(path) {
  const sid = getStoredSid();
  return `${API_BASE}${path}${sid ? `${path.includes('?') ? '&' : '?'}sid=${encodeURIComponent(sid)}` : ''}`;
}

async function initGuestbook(slug) {
  const el = document.getElementById('gbSection');
  if (!el) return;
  try {
    const res = await fetch(gbUrl(`/guestbook/${encodeURIComponent(slug)}`), gbFetchOpts());
    if (!res.ok) throw new Error('load failed');
    const data = await res.json();
    renderGuestbook(slug, data);
  } catch {
    el.innerHTML = '<div class="gb-empty">Could not load the guestbook.</div>';
  }
}

function renderGuestbook(slug, data) {
  const el = document.getElementById('gbSection');
  if (!el) return;
  const entries = data.entries || [];

  const listHtml = entries.length ? `
    <div class="gb-list">
      ${entries.map(e => `
        <div class="gb-entry ${e.pinned ? 'pinned' : ''}">
          <img class="gb-avatar" src="${escapeHtml(e.authorAvatar || 'https://cdn.discordapp.com/embed/avatars/0.png')}" alt="" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
          <div class="gb-body">
            <div class="gb-author">
              ${e.authorSlug ? `<a href="/${escapeHtml(e.authorSlug)}">${escapeHtml(e.authorName)}</a>` : escapeHtml(e.authorName)}
              ${e.pinned ? '<span class="gb-pin-tag">📌 PINNED</span>' : ''}
              <span class="gb-time">${gbTimeAgo(e.createdAt)}</span>
            </div>
            <div class="gb-msg">${escapeHtml(e.message)}</div>
          </div>
          <div class="gb-actions">
            ${data.isOwner ? `<button class="gb-action-btn" title="${e.pinned ? 'Unpin' : 'Pin'}" onclick="gbPin('${escapeHtml(slug)}','${escapeHtml(e.id)}')">📌</button>` : ''}
            ${(data.isOwner || e.mine) ? `<button class="gb-action-btn" title="Delete" onclick="gbDelete('${escapeHtml(slug)}','${escapeHtml(e.id)}')">✕</button>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  ` : '<div class="gb-empty">No signatures yet — be the first!</div>';

  let formHtml = '';
  if (data.isOwner) {
    formHtml = '';
  } else if (data.viewerSignedIn) {
    formHtml = `
      <div class="gb-form">
        <input class="gb-input" id="gbInput" maxlength="280" placeholder="Leave a message…"/>
        <button class="gb-submit" onclick="gbPost('${escapeHtml(slug)}')">Sign</button>
      </div>
    `;
  } else {
    formHtml = `
      <div class="gb-signin-row">
        <a class="gb-signin" href="${OAUTH_LOGIN_URL}?return=/${encodeURIComponent(slug)}">Sign in with Discord to sign the guestbook</a>
      </div>
    `;
  }

  el.innerHTML = listHtml + formHtml;
  const input = document.getElementById('gbInput');
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') gbPost(slug); });
}

async function gbPost(slug) {
  const input = document.getElementById('gbInput');
  const message = (input?.value || '').trim();
  if (message.length < 2) { showCopyToast('Message is too short'); return; }
  try {
    const res = await fetch(gbUrl(`/guestbook/${encodeURIComponent(slug)}`), {
      ...gbFetchOpts(),
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { showCopyToast(data.error || 'Could not sign the guestbook'); return; }
    showCopyToast('Signed!');
    initGuestbook(slug);
  } catch { showCopyToast('Could not sign the guestbook'); }
}

async function gbDelete(slug, id) {
  try {
    await fetch(gbUrl(`/guestbook/entry/${encodeURIComponent(id)}`), { ...gbFetchOpts(), method: 'DELETE' });
    initGuestbook(slug);
  } catch {}
}

async function gbPin(slug, id) {
  try {
    await fetch(gbUrl(`/guestbook/entry/${encodeURIComponent(id)}/pin`), { ...gbFetchOpts(), method: 'POST' });
    initGuestbook(slug);
  } catch {}
}

// ── Entry splash ("click to enter") ──
function showEntrySplash(p, playMusicOnEnter) {
  const splash = document.createElement('div');
  splash.className = 'entry-splash';
  splash.innerHTML = `
    <img class="entry-splash-avatar" src="${escapeHtml(p.avatarUrl || 'https://cdn.discordapp.com/embed/avatars/0.png')}" alt="" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
    <div class="entry-splash-name">${escapeHtml(p.displayName)}</div>
    <div class="entry-splash-hint">Click to enter</div>
  `;
  document.body.appendChild(splash);
  splash.addEventListener('click', () => {
    splash.classList.add('leaving');
    setTimeout(() => splash.remove(), 550);
    if (playMusicOnEnter && audio) {
      audio.play().then(() => {
        isPlaying = true;
        const btn = document.getElementById('musicBtn');
        if (btn) btn.textContent = '⏸';
        document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
        startVisualizer();
      }).catch(() => {});
    }
  }, { once: true });
}

// ── Typewriter bio ──
function initTypewriter(bio) {
  const el = document.getElementById('profileBio');
  if (!el) return;
  const text = String(bio);
  el.textContent = '';
  const caret = document.createElement('span');
  caret.className = 'typewriter-caret';
  el.appendChild(caret);
  let i = 0;
  const tick = () => {
    if (i < text.length) {
      caret.before(document.createTextNode(text[i]));
      i++;
      setTimeout(tick, 28 + Math.random() * 40);
    } else {
      setTimeout(() => caret.remove(), 2500);
    }
  };
  setTimeout(tick, 400);
}

// ── 3D tilt ──
function initTilt() {
  if (!window.matchMedia('(pointer: fine)').matches) return;
  const card = document.getElementById('card');
  if (!card) return;
  card.classList.add('tilt-enabled');
  const MAX = 7;
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    card.style.transform = `perspective(1000px) rotateY(${px * MAX}deg) rotateX(${-py * MAX}deg)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg)';
  });
}

function renderSpotifyIdle(message) {
  const slot = document.getElementById('spotifySlot');
  if (!slot) return;
  slot.innerHTML = `
    <div class="spotify-widget" style="cursor:default">
      <div class="spotify-art" style="display:flex;align-items:center;justify-content:center;font-size:22px">🎵</div>
      <div class="spotify-meta">
        <div class="spotify-label">Spotify connected</div>
        <div class="spotify-track">${escapeHtml(message || 'Not playing right now')}</div>
        <div class="spotify-artist">Open Spotify and play a song</div>
      </div>
      <div class="spotify-bars"><div class="spotify-bar paused" style="height:6px"></div><div class="spotify-bar paused" style="height:8px"></div><div class="spotify-bar paused" style="height:4px"></div></div>
    </div>
  `;
}

function renderSpotifyWidget(track, playing) {
  const slot = document.getElementById('spotifySlot');
  if (!slot) return;
  if (!track) {
    slot.innerHTML = '';
    return;
  }
  const href = track.url ? escapeHtml(track.url) : '#';
  const bars = playing
    ? '<div class="spotify-bars"><div class="spotify-bar" style="height:6px"></div><div class="spotify-bar" style="height:12px"></div><div class="spotify-bar" style="height:5px"></div></div>'
    : '<div class="spotify-bars"><div class="spotify-bar paused" style="height:6px"></div><div class="spotify-bar paused" style="height:8px"></div><div class="spotify-bar paused" style="height:4px"></div></div>';
  slot.innerHTML = `
    <a class="spotify-widget" href="${href}" target="_blank" rel="noopener noreferrer">
      ${track.albumArt ? `<img class="spotify-art" src="${escapeHtml(track.albumArt)}" alt=""/>` : '<div class="spotify-art"></div>'}
      <div class="spotify-meta">
        <div class="spotify-label">${playing ? 'Listening on Spotify' : 'Spotify · paused'}</div>
        <div class="spotify-track">${escapeHtml(track.name)}</div>
        <div class="spotify-artist">${escapeHtml(track.artist)}</div>
      </div>
      ${bars}
    </a>
  `;
}

async function pollSpotify(slug) {
  try {
    const res = await fetch(`${API_BASE}/spotify/now-playing/${encodeURIComponent(slug)}`);
    if (!res.ok) {
      renderSpotifyIdle('Spotify unavailable');
      return;
    }
    const data = await res.json();
    if (data.track) {
      renderSpotifyWidget(data.track, !!data.playing);
    } else if (data.connected) {
      const msg = data.errorReason === 'dev_mode'
        ? 'Spotify app in dev mode — owner must add this user in Spotify Developer Dashboard'
        : (data.tokenError ? 'Session expired — reconnect in dashboard' : 'Not playing right now');
      renderSpotifyIdle(msg);
    } else {
      renderSpotifyIdle('Not playing right now');
    }
  } catch {
    renderSpotifyIdle('Could not load Spotify status');
  }
}

function initSpotifyWidget(slug) {
  renderSpotifyIdle('Loading...');
  pollSpotify(slug);
  setInterval(() => pollSpotify(slug), 30000);
}

renderProfile();
</script>
