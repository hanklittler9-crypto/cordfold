<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cordfol Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090d;
      --surface: #11131a;
      --surface2: #171922;
      --accent: #5865F2;
      --accent2: #7c5cff;
      --text: #f5f7fb;
      --muted: rgba(245,247,251,0.5);
      --neon: #00FFB2;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg);
      overflow: hidden;
    }
    .bg-animated::before,
    .bg-animated::after {
      content: none;
      display: none;
    }
    .bg-animated.show-orbs::before {
      content: '';
      display: block;
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      top: -200px;
      left: -200px;
      opacity: 0.15;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-animated.show-orbs::after {
      content: '';
      display: block;
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--neon) 0%, transparent 70%);
      bottom: -200px;
      right: -200px;
      opacity: 0.08;
      animation: drift2 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 80px) scale(1.2); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-80px, -60px) scale(1.15); } }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 88px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 620px;
      background: linear-gradient(180deg, rgba(18,20,28,0.92), rgba(12,13,19,0.92));
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
      animation: cardSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88,101,242,0.14), transparent 34%, rgba(0,255,178,0.05));
      pointer-events: none;
    }
    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Layout variants ── */
    .page.layout-centered { align-items: center; }
    .page.layout-left { align-items: flex-start; padding-left: clamp(16px, 6vw, 72px); }
    .page.layout-card { align-items: center; }
    .page.layout-card .card {
      max-width: 680px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* ── Background media ── */
    .bg-media {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-media img,
    .bg-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bg-blur-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      pointer-events: none;
    }

    /* ── Particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(110vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Card glass ── */
    .card.glass {
      background: rgba(var(--card-rgb, 17,17,17), var(--card-alpha, 0.92));
    }

    /* ── Banner ── */
    .banner {
      width: 100%;
      height: 170px;
      background: linear-gradient(135deg, var(--accent), var(--accent2) 48%, var(--neon) 100%);
      position: relative;
      flex-shrink: 0;
      overflow: hidden;
    }
    .banner img,
    .banner video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      display: flex;
      justify-content: flex-start;
      margin-top: -52px;
      position: relative;
      z-index: 2;
      padding: 0 26px;
    }
    .avatar {
      width: 106px;
      height: 106px;
      border-radius: 28px;
      border: 4px solid rgba(9,9,13,0.92);
      background: #222;
      object-fit: cover;
      box-shadow: 0 14px 36px rgba(0,0,0,0.42);
    }

    /* ── Body ── */
    .card-body {
      padding: 18px 26px 28px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .profile-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .profile-heading {
      min-width: 0;
    }

    .profile-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .profile-kicker::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 16px rgba(0,255,178,0.75);
    }

    .profile-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .verified-crown {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
      animation: crownPulse 2s ease-in-out infinite;
    }

    @keyframes crownPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .profile-tag {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .profile-bio {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 18px;
      max-width: 48ch;
    }

    .profile-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(245,247,251,0.72);
    }

    .summary-chip strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 0 0 20px;
    }

    /* ── Roles ── */
    .roles-title {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      text-align: left;
    }

    .roles-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 12px 14px;
      text-align: left;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }
    .role-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }

    .role-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      overflow: hidden;
    }

    .role-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .role-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .role-info {
      flex: 1;
      min-width: 0;
    }

    .role-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .role-server {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .role-proof {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(88,101,242,0.12);
      color: #9db2ff;
      border: 1px solid rgba(88,101,242,0.22);
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .role-proof.bot {
      background: rgba(0,255,178,0.08);
      color: var(--neon);
      border-color: rgba(0,255,178,0.2);
    }

    /* ── Socials ── */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-start;
      margin-top: 8px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3px;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .social-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .social-link:hover::before {
      opacity: 1;
    }

    .social-link.twitter { border-color: rgba(29, 155, 240, 0.3); color: #1DA1F2; }
    .social-link.twitter:hover { background: rgba(29, 155, 240, 0.1); box-shadow: 0 8px 24px rgba(29, 155, 240, 0.2); }

    .social-link.github { border-color: rgba(255,255,255, 0.1); }
    .social-link.github:hover { background: rgba(88, 166, 255, 0.12); color: #58a6ff; box-shadow: 0 8px 24px rgba(88, 166, 255, 0.15); }

    .social-link.youtube { border-color: rgba(255, 68, 68, 0.3); color: #FF4444; }
    .social-link.youtube:hover { background: rgba(255, 68, 68, 0.1); box-shadow: 0 8px 24px rgba(255, 68, 68, 0.2); }

    .social-link.instagram { border-color: rgba(225, 48, 108, 0.3); color: #E13084; }
    .social-link.instagram:hover { background: rgba(225, 48, 108, 0.1); box-shadow: 0 8px 24px rgba(225, 48, 108, 0.2); }

    .social-link.twitch { border-color: rgba(145, 71, 255, 0.3); color: #9146FF; }
    .social-link.twitch:hover { background: rgba(145, 71, 255, 0.1); box-shadow: 0 8px 24px rgba(145, 71, 255, 0.2); }

    .social-link.tiktok { border-color: rgba(0, 0, 0, 0.3); color: #000; }
    @media (prefers-color-scheme: dark) {
      .social-link.tiktok { color: #FFF; }
      .social-link.tiktok:hover { background: rgba(150, 150, 150, 0.1); }
    }

    .social-link.linkedin { border-color: rgba(0, 119, 181, 0.3); color: #0077B5; }
    .social-link.linkedin:hover { background: rgba(0, 119, 181, 0.1); box-shadow: 0 8px 24px rgba(0, 119, 181, 0.2); }

    .social-link.website { border-color: rgba(var(--accent-rgb, 88, 101, 242), 0.3); }
    .social-link.website:hover { background: rgba(var(--accent-rgb, 88, 101, 242), 0.1); }

    /* ── Spotify now playing ── */
    .spotify-widget {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(30, 215, 96, 0.08);
      border: 1px solid rgba(30, 215, 96, 0.22);
      margin-bottom: 18px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .spotify-widget:hover {
      background: rgba(30, 215, 96, 0.12);
      border-color: rgba(30, 215, 96, 0.35);
      transform: translateY(-2px);
    }
    .spotify-art {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
    }
    .spotify-meta { min-width: 0; flex: 1; }
    .spotify-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #1ed760;
      margin-bottom: 4px;
    }
    .spotify-track {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spotify-artist {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .spotify-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
      flex-shrink: 0;
    }
    .spotify-bar {
      width: 3px;
      border-radius: 2px;
      background: #1ed760;
      animation: musicbar 0.8s ease-in-out infinite alternate;
    }
    .spotify-bar:nth-child(1) { animation-delay: 0s; }
    .spotify-bar:nth-child(2) { animation-delay: 0.15s; }
    .spotify-bar:nth-child(3) { animation-delay: 0.3s; }
    .spotify-bar.paused { animation-play-state: paused; opacity: 0.35; }

    /* ── Music player ── */
    .music-player {
      position: fixed;
      bottom: 22px;
      right: 22px;
      z-index: 100;
      background: rgba(17,17,17,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-width: 214px;
    }

    .music-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .music-btn:hover { background: #4752C4; }

    .music-info {
      flex: 1;
      min-width: 0;
    }

    .music-label {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .music-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    .music-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: musicbar 0.8s ease-in-out infinite alternate;
    }
    .music-bar:nth-child(1) { animation-delay: 0s; }
    .music-bar:nth-child(2) { animation-delay: 0.15s; }
    .music-bar:nth-child(3) { animation-delay: 0.3s; }
    .music-bar:nth-child(4) { animation-delay: 0.45s; }
    .music-bar:nth-child(5) { animation-delay: 0.6s; }
    .music-bar.paused { animation-play-state: paused; }

    @keyframes musicbar {
      from { height: 3px; }
      to { height: 14px; }
    }

    /* ── Footer ── */
    .profile-footer {
      margin-top: 26px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.26);
      letter-spacing: 1px;
      text-align: center;
    }
    .profile-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .profile-footer a:hover { color: var(--neon); }

    /* ── Action Bar ── */
    .profile-actions {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 100;
      display: flex;
      gap: 10px;
      flex-direction: column;
    }

    .action-btn {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(88, 101, 242, 0.9);
      border: 1px solid rgba(88, 101, 242, 0.3);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .action-btn:hover {
      background: rgba(88, 101, 242, 1);
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(88, 101, 242, 0.3);
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .action-tooltip {
      position: absolute;
      right: 60px;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .action-btn:hover .action-tooltip {
      opacity: 1;
    }

    /* ── Copy Toast ── */
    .copy-toast {
      position: fixed;
      bottom: 100px;
      right: 28px;
      background: rgba(0, 255, 178, 0.95);
      color: #000;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(10px);
      animation: toastSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 101;
    }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 40px 0;
      animation: fadeIn 0.4s ease;
    }

    .skeleton-banner {
      width: 100%;
      height: 170px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 0;
    }

    .skeleton-avatar-wrap {
      padding: 0 26px;
      margin-top: -52px;
      position: relative;
      z-index: 2;
    }

    .skeleton-avatar {
      width: 106px;
      height: 106px;
      border-radius: 28px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border: 4px solid rgba(9,9,13,0.92);
    }

    .skeleton-body {
      padding: 18px 26px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .skeleton-text {
      height: 16px;
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }

    .skeleton-title {
      height: 28px;
      width: 70%;
      border-radius: 12px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.08) 100%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }

    .skeleton-chips {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .skeleton-chip {
      height: 24px;
      width: 90px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }

    .skeleton-socials {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .skeleton-social {
      height: 44px;
      width: 110px;
      border-radius: 14px;
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 100%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }

    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      padding: 64px 0;
      font-family: 'Space Mono', monospace;
    }
    .not-found h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .not-found p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .claim-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 40px 28px;
      text-align: center;
    }

    .claim-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--neon);
    }

    .claim-slug {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(88,101,242,0.28);
      background: rgba(88,101,242,0.12);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .claim-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 4px;
    }

    .claim-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      cursor: pointer;
    }
    .claim-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 26px rgba(88,101,242,0.24);
    }
    .claim-btn.secondary {
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-color: rgba(255,255,255,0.12);
      box-shadow: none;
    }
    .claim-btn.secondary:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
    }

    @media (max-width: 520px) {
      .page {
        padding-top: 34px;
      }

      .card {
        border-radius: 22px;
      }

      .banner {
        height: 142px;
      }

      .avatar-wrap {
        padding: 0 18px;
      }

      .avatar {
        width: 88px;
        height: 88px;
        border-radius: 22px;
      }

      .profile-header {
        flex-direction: column;
      }

      .card-body {
        padding: 16px 18px 22px;
      }

      .claim-card {
        padding: 34px 20px;
      }

      .claim-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="bg-animated" id="bgEl"></div>
<div class="bg-media" id="bgMedia"></div>
<div class="bg-blur-layer" id="bgBlurLayer" style="display:none"></div>
<div class="particles" id="particlesEl" style="display:none"></div>
<div class="noise"></div>

<div class="page layout-centered">
  <div class="card" id="card">
    <div class="skeleton-banner"></div>
    <div class="skeleton-avatar-wrap">
      <div class="skeleton-avatar"></div>
    </div>
    <div class="skeleton-body">
      <div class="skeleton-title"></div>
      <div class="skeleton-text" style="width: 50%;"></div>
      <div class="skeleton-chips">
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
        <div class="skeleton-chip"></div>
      </div>
      <div style="margin-top: 12px;"></div>
      <div class="skeleton-socials">
        <div class="skeleton-social"></div>
        <div class="skeleton-social"></div>
        <div class="skeleton-social"></div>
      </div>
    </div>
  </div>
  <div class="profile-footer">
    Powered by <a href="https://cordfol.org" target="_blank">CORDFOL.ORG</a> · Discord Identity, Verified.
  </div>
</div>

<!-- Action Bar -->
<div class="profile-actions" id="actionBar">
  <button class="action-btn" id="copyBtn" title="Copy Handle">
    <span class="action-tooltip">Copy Handle</span>
    📋
  </button>
  <button class="action-btn" id="shareBtn" title="Share Profile">
    <span class="action-tooltip">Share</span>
    🔗
  </button>
</div>

<script>
const SOCIAL_ICONS = {
  twitter: '𝕏',
  github: '⚙️',
  youtube: '▶️',
  website: '🌐',
  twitch: '📺',
  instagram: '📷',
  tiktok: '🎵',
  linkedin: 'in',
};

const SOCIAL_NAMES = {
  twitter: 'Twitter',
  github: 'GitHub',
  youtube: 'YouTube',
  website: 'Website',
  twitch: 'Twitch',
  instagram: 'Instagram',
  tiktok: 'TikTok',
  linkedin: 'LinkedIn',
};

const EXCLUSIVE_USER_ID = '1127435524022472805';

const API_BASE = 'https://api.cordfol.org/api';
const OAUTH_LOGIN_URL = 'https://api.cordfol.org/api/auth/discord';
const DASHBOARD_URL = 'https://dashboard.cordfol.org/dashboard.html';
const CLAIM_COOKIE_NAME = 'cordfol_claim_slug';

let audio = null;
let isPlaying = false;

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function hexToRgb(hex) {
  const clean = String(hex || '#111111').replace('#', '');
  if (clean.length !== 6) return '17,17,17';
  return [
    parseInt(clean.slice(0, 2), 16),
    parseInt(clean.slice(2, 4), 16),
    parseInt(clean.slice(4, 6), 16),
  ].join(',');
}

function isVideoUrl(url) {
  return /\.(mp4|webm|ogg)(\?|$)/i.test(url) || String(url || '').startsWith('data:video');
}

function isGradientValue(value) {
  return String(value || '').includes('gradient(');
}

function buildSocialUrl(platform, value) {
  if (!value || !String(value).trim()) return null;
  const v = String(value).trim();
  if (/^https?:\/\//i.test(v)) return v;
  const handle = v.replace(/^@/, '');
  const map = {
    twitter: `https://x.com/${handle}`,
    github: `https://github.com/${handle}`,
    youtube: `https://youtube.com/@${handle}`,
    tiktok: `https://tiktok.com/@${handle}`,
    instagram: `https://instagram.com/${handle}`,
  };
  if (map[platform]) return map[platform];
  if (platform === 'website') return v.includes('.') ? (v.startsWith('http') ? v : `https://${v}`) : null;
  return null;
}

function applyFont(fontName) {
  const fontMap = {
    'DM Sans': "'DM Sans', sans-serif",
    'Space Mono': "'Space Mono', monospace",
    'Bebas Neue': "'Bebas Neue', sans-serif",
  };
  document.body.style.fontFamily = fontMap[fontName] || fontMap['DM Sans'];
}

function applyLayout(layout) {
  const page = document.querySelector('.page');
  page.classList.remove('layout-centered', 'layout-left', 'layout-card');
  page.classList.add(`layout-${layout || 'centered'}`);
}

function isGifUrl(url) {
  return /\.gif(\?|$)/i.test(url) || String(url || '').startsWith('data:image/gif');
}

function applyBackground(theme) {
  const bgEl = document.getElementById('bgEl');
  const bgMedia = document.getElementById('bgMedia');
  const bgBlur = document.getElementById('bgBlurLayer');
  bgMedia.innerHTML = '';
  bgEl.classList.remove('show-orbs');

  let bgType = theme.bgType || 'solid';
  const bgValue = theme.bgValue || '';
  const accent = theme.accentColor || '#5865F2';

  if ((bgType === 'solid' || bgType === 'gradient') && bgValue) {
    if (isVideoUrl(bgValue)) bgType = 'video';
    else if (isGifUrl(bgValue)) bgType = 'gif';
  }

  if (bgType === 'gif' || bgType === 'video') {
    bgEl.style.background = '#09090d';
    const media = document.createElement(bgType === 'video' || isVideoUrl(bgValue) ? 'video' : 'img');
    media.src = bgValue;
    if (media.tagName === 'VIDEO') {
      media.autoplay = true;
      media.muted = true;
      media.loop = true;
      media.playsInline = true;
    }
    bgMedia.appendChild(media);
  } else if (bgType === 'gradient' || isGradientValue(bgValue) || isGradientValue(theme.backgroundColor)) {
    bgEl.style.background = bgValue || theme.backgroundColor;
    if (theme.animatedBg) bgEl.classList.add('show-orbs');
  } else {
    bgEl.style.background = bgValue || theme.backgroundColor || '#0d0d0d';
    if (theme.animatedBg) bgEl.classList.add('show-orbs');
  }

  bgBlur.style.display = theme.bgBlur ? 'block' : 'none';
}

function applyCardTheme(theme) {
  const card = document.getElementById('card');
  const cardColor = theme.cardColor || '#111111';
  const cardOpacity = theme.cardOpacity != null
    ? (Number(theme.cardOpacity) > 1 ? Number(theme.cardOpacity) / 100 : Number(theme.cardOpacity))
    : 0.92;
  const glassOn = theme.glassmorphism || theme.glassEnabled;

  document.documentElement.style.setProperty('--card-rgb', hexToRgb(cardColor));
  document.documentElement.style.setProperty('--card-alpha', String(cardOpacity));

  if (glassOn) {
    card.classList.add('glass');
    card.style.backdropFilter = `blur(${theme.glassBlur || 18}px)`;
    card.style.webkitBackdropFilter = `blur(${theme.glassBlur || 18}px)`;
  } else {
    card.classList.remove('glass');
    const rgb = hexToRgb(cardColor);
    card.style.background = `linear-gradient(180deg, rgba(${rgb},${cardOpacity}), rgba(${rgb},${Math.max(cardOpacity - 0.08, 0.5)}))`;
    card.style.backdropFilter = '';
  }
}

function initParticles(enabled, accent) {
  const el = document.getElementById('particlesEl');
  el.innerHTML = '';
  if (!enabled) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.width = `${size}px`;
    p.style.height = `${size}px`;
    p.style.left = `${Math.random() * 100}%`;
    p.style.background = accent || 'rgba(255,255,255,0.35)';
    p.style.animationDuration = `${8 + Math.random() * 14}s`;
    p.style.animationDelay = `${Math.random() * 10}s`;
    el.appendChild(p);
  }
}

function buildBannerHtml(bannerUrl, accentColor) {
  const accent = accentColor || '#5865F2';
  if (!bannerUrl) {
    return `<div class="banner" style="background:linear-gradient(135deg, ${accent} 0%, #7C3AED 100%)"></div>`;
  }
  if (isGradientValue(bannerUrl)) {
    return `<div class="banner" style="background:${bannerUrl}"></div>`;
  }
  if (isVideoUrl(bannerUrl)) {
    return `<div class="banner"><video autoplay muted loop playsinline src="${escapeHtml(bannerUrl)}"></video></div>`;
  }
  return `<div class="banner"><img src="${escapeHtml(bannerUrl)}" alt="banner"/></div>`;
}

function sanitizeSlug(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[^a-z0-9\-]/g, '')
    .replace(/^-+|-+$/g, '')
    .slice(0, 32);
}

function setClaimCookie(slug) {
  document.cookie = `${CLAIM_COOKIE_NAME}=${encodeURIComponent(slug)}; Max-Age=1800; Path=/; Domain=.cordfol.org; Secure; SameSite=Lax`;
}

function claimSlug(slug, destination = 'oauth') {
  const cleanSlug = sanitizeSlug(slug);
  if (!cleanSlug) return;
  setClaimCookie(cleanSlug);
  window.location.href = destination === 'dashboard'
    ? `${DASHBOARD_URL}?claim=${encodeURIComponent(cleanSlug)}`
    : OAUTH_LOGIN_URL;
}

function showCopyToast(text) {
  const existingToast = document.querySelector('.copy-toast');
  if (existingToast) existingToast.remove();
  
  const toast = document.createElement('div');
  toast.className = 'copy-toast';
  toast.textContent = text;
  document.body.appendChild(toast);
  
  setTimeout(() => toast.remove(), 2000);
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showCopyToast('✓ Copied to clipboard!');
  }).catch(() => {
    showCopyToast('Failed to copy');
  });
}

function buildMissingProfileMarkup(slug) {
  const cleanSlug = sanitizeSlug(slug);
  if (!cleanSlug) {
    return `<div class="not-found"><h1>404</h1><p>Profile not found.</p></div>`;
  }

  return `
    <div class="claim-card">
      <div class="claim-eyebrow">This handle is open</div>
      <div class="not-found">
        <h1>CLAIM IT</h1>
        <p>No one has created <span class="claim-slug">cordfol.org/${cleanSlug}</span> yet.</p>
        <p>Log in with Discord and we’ll take you to the profile builder with this handle ready to claim.</p>
      </div>
      <div class="claim-actions">
        <button class="claim-btn" type="button" onclick="claimSlug('${cleanSlug}')">Claim This Handle</button>
        <button class="claim-btn secondary" type="button" onclick="claimSlug('${cleanSlug}', 'dashboard')">Open Dashboard</button>
      </div>
    </div>
  `;
}

function toggleMusic() {
  if (!audio) return;
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    document.getElementById('musicBtn').textContent = '▶';
    document.querySelectorAll('.music-bar').forEach(b => b.classList.add('paused'));
  } else {
    audio.muted = false;
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('musicBtn').textContent = '⏸';
      document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
    }).catch(err => console.error('Audio play failed:', err));
  }
}

async function renderProfile() {
  const url = new URL(window.location.href);
  const slug = sanitizeSlug(window.location.pathname.replace(/^\/+/, '').split('/')[0] || url.searchParams.get('slug') || '');
  if (!slug) {
    document.getElementById('card').innerHTML = `<div class="not-found"><h1>404</h1><p>Profile not found.</p></div>`;
    return;
  }

  let data;
  try {
    const res = await fetch(`${API_BASE}/profile/${slug}`);
    if (!res.ok) throw new Error('Not found');
    data = await res.json();
  } catch {
    document.getElementById('card').innerHTML = buildMissingProfileMarkup(slug);
    return;
  }

  const p = data.profile;
  const t = data.theme || {};
  const roles = data.roles || [];
  const activeRoleCount = roles.length;
  const botVerifiedCount = roles.filter(r => r.proofType === 'BOT').length;
  const oauthVerifiedCount = roles.filter(r => r.proofType === 'OAUTH').length;
  const socialLinks = (p.socialLinks && typeof p.socialLinks === 'object') ? p.socialLinks : {};

  // Store for action buttons
  window.currentProfile = {
    displayName: p.displayName,
    slug: p.slug,
    discordId: p.discordId,
    isExclusive: p.discordId === EXCLUSIVE_USER_ID
  };

  // Setup action buttons
  document.getElementById('copyBtn').onclick = () => copyToClipboard(`cordfol.org/${p.slug}`);
  document.getElementById('shareBtn').onclick = () => {
    const url = `${window.location.origin}/${p.slug}`;
    const text = `Check out my Discord profile on Cordfol: ${url}`;
    if (navigator.share) {
      navigator.share({ title: `${p.displayName}'s Cordfol`, url });
    } else {
      copyToClipboard(url);
    }
  };

  // Apply theme
  const root = document.documentElement;
  root.style.setProperty('--bg', t.backgroundColor || '#0d0d0d');
  root.style.setProperty('--surface', t.cardColor || '#111');
  root.style.setProperty('--surface2', t.cardColor ? t.cardColor : '#181818');
  root.style.setProperty('--accent', t.accentColor || '#5865F2');
  root.style.setProperty('--text', t.textColor || '#f0f0f0');
  root.style.setProperty('--muted', t.textColor ? 'rgba(255,255,255,0.65)' : '#888');
  root.style.setProperty('--accent-rgb', hexToRgb(t.accentColor || '#5865F2'));

  applyFont(t.font || 'DM Sans');
  applyLayout(t.layout || 'centered');
  applyBackground(t);
  applyCardTheme(t);
  initParticles(t.particles, t.accentColor);
  document.title = `${p.displayName} — Cordfol`;

  // Custom CSS
  if (t.customCss) {
    const style = document.createElement('style');
    style.innerHTML = t.customCss;
    document.head.appendChild(style);
  }

  // Music
  if (t.musicUrl) {
    console.log('[profile] Music URL:', t.musicUrl);
    
    // Validate URL is a direct audio file, not a YouTube link or other embed
    if (t.musicUrl.includes('youtube.com') || t.musicUrl.includes('youtu.be')) {
      console.error('[profile] YouTube URLs are not supported. Use a direct audio file URL (mp3, wav, ogg, etc)');
    } else {
      audio = new Audio(t.musicUrl);
      audio.loop = true;
      audio.crossOrigin = 'anonymous';
      audio.onerror = () => {
        console.error('[profile] Failed to load audio:', t.musicUrl);
      };
      audio.oncanplay = () => {
        console.log('[profile] Audio loaded successfully');
      };
      
      if (t.musicAutoplay) {
        audio.muted = true;
        audio.play().then(() => {
          audio.muted = false;
          isPlaying = true;
          document.getElementById('musicBtn').textContent = '⏸';
          document.querySelectorAll('.music-bar').forEach(b => b.classList.remove('paused'));
          console.log('[profile] Audio autoplay started');
        }).catch(err => console.error('Autoplay failed:', err));
      }
      const player = document.createElement('div');
      player.className = 'music-player';
      player.innerHTML = `
        <button class="music-btn" id="musicBtn" onclick="toggleMusic()">${isPlaying ? '⏸' : '▶'}</button>
        <div class="music-info">
          <div class="music-label">Now Playing</div>
          <div class="music-bars">
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:6px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:10px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:4px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:12px"></div>
            <div class="music-bar ${isPlaying ? '' : 'paused'}" style="height:7px"></div>
          </div>
        </div>
      `;
      document.body.appendChild(player);
    }
  }

  // Roles HTML
  const rolesHtml = roles.length ? `
    <div class="divider"></div>
    <div class="roles-title">Verified Roles</div>
    <div class="roles-list">
      ${roles.map(r => `
        <div class="role-item">
          <div class="role-icon" ${r.guildIconHash ? `style="background-image: url('https://cdn.discordapp.com/icons/${r.guildId}/${r.guildIconHash}.png'); background-size: cover; background-position: center;"` : ''}>
            ${!r.guildIconHash ? '🏰' : ''}
          </div>
          <div class="role-info">
            <div class="role-name">${escapeHtml(r.roleName || r.roleId)}</div>
            <div class="role-server">${escapeHtml(r.guildName || 'Unknown Server')}</div>
          </div>
          <div class="role-proof ${r.proofType === 'BOT' ? 'bot' : ''}">${r.proofType === 'BOT' ? 'Bot Verified' : r.proofType === 'OAUTH' ? 'OAuth Verified' : escapeHtml(r.proofType)}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  // Socials HTML
  const socialEntries = Object.entries(socialLinks)
    .map(([k, v]) => [k, buildSocialUrl(k, v)])
    .filter(([, url]) => url);

  const socialsHtml = socialEntries.length ? `
    <div class="divider"></div>
    <div class="socials">
      ${socialEntries.map(([k, url]) => `
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="social-link ${k}" title="${SOCIAL_NAMES[k] || 'Link'}">
          <span>${SOCIAL_ICONS[k] || '🔗'}</span>
          <span>${SOCIAL_NAMES[k] || 'Link'}</span>
        </a>
      `).join('')}
    </div>
  ` : '';

  const bannerHtml = buildBannerHtml(p.bannerUrl, t.accentColor);

  document.getElementById('card').innerHTML = `
    ${bannerHtml}
    <div class="avatar-wrap">
      <img class="avatar" src="${escapeHtml(p.avatarUrl || '')}" alt="avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
    </div>
    <div class="card-body">
      <div class="profile-header">
        <div class="profile-heading">
          <div class="profile-kicker">Verified Discord profile</div>
          <div class="profile-name">
            ${escapeHtml(p.displayName)}
            ${p.discordId === EXCLUSIVE_USER_ID ? '<div class="verified-crown" title="Cordfol Creator">👑</div>' : ''}
          </div>
          <div class="profile-tag">cordfol.org/${escapeHtml(p.slug)}</div>
        </div>
      </div>
      ${p.bio ? `<div class="profile-bio">${escapeHtml(p.bio)}</div>` : ''}
      <div id="spotifySlot"></div>
      <div class="profile-summary">
        <div class="summary-chip"><strong>${activeRoleCount}</strong> Active roles</div>
        <div class="summary-chip"><strong>${botVerifiedCount}</strong> Bot proof</div>
        <div class="summary-chip"><strong>${oauthVerifiedCount}</strong> OAuth proof</div>
      </div>
      ${rolesHtml}
      ${socialsHtml}
    </div>
  `;

  if (p.spotify?.public) {
    initSpotifyWidget(p.slug);
  }
}

function renderSpotifyWidget(track, playing) {
  const slot = document.getElementById('spotifySlot');
  if (!slot) return;
  if (!track) {
    slot.innerHTML = '';
    return;
  }
  const href = track.url ? escapeHtml(track.url) : '#';
  const bars = playing
    ? '<div class="spotify-bars"><div class="spotify-bar" style="height:6px"></div><div class="spotify-bar" style="height:12px"></div><div class="spotify-bar" style="height:5px"></div></div>'
    : '<div class="spotify-bars"><div class="spotify-bar paused" style="height:6px"></div><div class="spotify-bar paused" style="height:8px"></div><div class="spotify-bar paused" style="height:4px"></div></div>';
  slot.innerHTML = `
    <a class="spotify-widget" href="${href}" target="_blank" rel="noopener noreferrer">
      ${track.albumArt ? `<img class="spotify-art" src="${escapeHtml(track.albumArt)}" alt=""/>` : '<div class="spotify-art"></div>'}
      <div class="spotify-meta">
        <div class="spotify-label">${playing ? 'Listening on Spotify' : 'Spotify · paused'}</div>
        <div class="spotify-track">${escapeHtml(track.name)}</div>
        <div class="spotify-artist">${escapeHtml(track.artist)}</div>
      </div>
      ${bars}
    </a>
  `;
}

async function pollSpotify(slug) {
  try {
    const res = await fetch(`${API_BASE}/spotify/now-playing/${encodeURIComponent(slug)}`);
    if (!res.ok) {
      document.getElementById('spotifySlot').innerHTML = '';
      return;
    }
    const data = await res.json();
    if (data.playing && data.track) {
      renderSpotifyWidget(data.track, true);
    } else if (data.track) {
      renderSpotifyWidget(data.track, false);
    } else {
      document.getElementById('spotifySlot').innerHTML = '';
    }
  } catch {
    /* ignore transient errors */
  }
}

function initSpotifyWidget(slug) {
  pollSpotify(slug);
  setInterval(() => pollSpotify(slug), 30000);
}

renderProfile();
</script>
</body>
</html>
